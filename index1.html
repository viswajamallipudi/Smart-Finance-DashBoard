<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Finance Dashboard</title>
  <link rel="stylesheet" href="style1.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Finance</h2>
    <ul>
      <li>Dashboard</li>
      <li>Transactions</li>
      <li>Reports</li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">

    <h1>Dashboard</h1>
     
    <button id="toggleMode">🌙 Dark Mode</button>
    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h3>Balance</h3>
        <p>$5000</p>
      </div>

      <div class="card">
        <h3>Income</h3>
        <p>$3000</p>
      </div>

      <div class="card">
        <h3>Expenses</h3>
        <p>$1200</p>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-box">
      <canvas id="myChart"></canvas>
    </div>

    <!-- Transactions -->
    <div class="transactions">
      <h2>Recent Transactions</h2>
      <ul id="list"></ul>
    </div>

  </div>
</div>

<script src="script1.js"></script>
</body>
</html>
